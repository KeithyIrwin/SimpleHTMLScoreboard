<!DOCTYPE html>
<html>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <head>
    <style>
      .team1 {background-color: blue; color: white;}
      .team2 {background-color: red; color: white;}
      .box {
	  cursor: default;
	  float: left;
	  width: 50vw;
	  margin: 0px;
	  padding: 0px;
	  border: 0px;
	  height: 100vh;
      }
      .score {
	  width: 100%;
	  height: 100%;
	  text-align: center;
	  display: flex;
	  justify-content: center;
	  align-items: center;
	  margin: 0px;
      }
      .reset {
	  cursor: default;
	  width: 16%;
	  height: 16%;
	  position: fixed;
	  top: 0;
	  left: 42%;
	  color: yellow;
	  text-align: center;
      }
    </style>
    <script>
      function upsizeFont(box) {
	  box.style.overflow = "auto";
	  var boxSize = Math.min(box.clientWidth, box.clientHeight);
	  var minFontSize = 1;
	  var maxFontSize = boxSize*5;
	  var difference = Math.ceil(maxFontSize-minFontSize);
	  while (difference > 1) {
	      average = (minFontSize + maxFontSize)/2;
	      box.style.fontSize = average + "px";
	      if (box.scrollWidth > box.clientWidth ||
		  box.scrollHeight > box.clientHeight*1.15) {
		  // Scrolling is happening, so we've gotten too big
		  maxFontSize = average;
	      } else {
		  // Scrolling is not happening, so we could get bigger
		  minFontSize = average;
	      }
	      difference = Math.ceil(maxFontSize-minFontSize);
	  }
	  box.style.overflow = "hidden";
	  return Math.ceil(maxFontSize);
      }
      function refreshBoxSizes() {
	  scores = document.getElementsByClassName("score");
	  let min = 100000000000;
	  Array.prototype.forEach.call(scores,function(score) {
	      var size = upsizeFont(score);
	      min = Math.min(size,min);
	  });
	  Array.prototype.forEach.call(scores,function(score) {
	      score.style.fontSize = min + "px";
	  });
      }
      function maximizeResetFontSize() {
	  upsizeFont(document.getElementsByClassName("reset")[0]);
      }

      window.onresize = function () {
	  refreshBoxSizes();
	  maximizeResetFontSize();
      }
      window.onload = function() {
	  refreshBoxSizes();
	  maximizeResetFontSize();
	  var boxes = document.getElementsByClassName("box");
	  Array.prototype.forEach.call(boxes, function(box) {
	      box.addEventListener("click", function(event) {
		  score = box.getElementsByClassName("score")[0];
		  console.log(score);
		  if (event.clientY > 2*box.clientHeight/3) {
		      score.innerText--;
		  } else {
		      score.innerText++;
		  }
		  refreshBoxSizes();
	      });
	  });
	  document.getElementsByClassName("reset")[0]
	      .addEventListener("click",function (event) {
		  scores = document.getElementsByClassName("score");
		  Array.prototype.forEach.call(scores,function(score) {
		      score.innerText = 0;
		  });
	      });			      
      };
    </script>
  </head>
